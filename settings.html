<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール設定 - MOMOCRI School Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-cyan-200">

    <div class="flex h-screen overflow-hidden">

        <!-- Sidebar -->
        <div class="w-64 bg-white border-r border-slate-200 flex flex-col z-30 shadow-xl lg:shadow-none hidden lg:flex">
            <div class="h-20 flex items-center justify-center border-b border-slate-100">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/30">
                        <i data-lucide="zap" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-500 tracking-wider">MOMOCRI</span>
                </div>
            </div>

            <nav class="p-4 space-y-2 flex-1">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-900 hover:bg-slate-50">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span class="font-medium">ダッシュボード</span>
                </a>
                <a href="learning.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-900 hover:bg-slate-50">
                    <i data-lucide="monitor" class="w-5 h-5"></i>
                    <span class="font-medium">学習ルーム</span>
                </a>
                <a href="courses.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-900 hover:bg-slate-50">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                    <span class="font-medium">コース一覧</span>
                </a>
                <a href="community.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-900 hover:bg-slate-50">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="font-medium">コミュニティ</span>
                </a>
                <a href="corp/index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-900 hover:bg-slate-50">
                    <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                    <span class="font-medium">管理者/法人</span>
                </a>
            </nav>

            <div class="p-4 border-t border-slate-100">
                <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-slate-50 border border-slate-200">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-fuchsia-500 to-purple-600 flex items-center justify-center text-white font-bold shadow-md">AS</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-slate-700 truncate">長谷川 麻子</p>
                        <p class="text-xs text-slate-500 truncate">Pro Plan</p>
                    </div>
                    <i data-lucide="settings" class="w-5 h-5 text-slate-400 cursor-pointer hover:text-slate-600"></i>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 bg-slate-50 relative overflow-hidden">
             <!-- Background Decoration -->
             <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
                <div class="absolute top-[20%] right-[10%] w-[600px] h-[600px] bg-fuchsia-200/20 rounded-full blur-[120px]"></div>
                <div class="absolute bottom-[10%] left-[5%] w-[500px] h-[500px] bg-cyan-200/20 rounded-full blur-[120px]"></div>
            </div>

            <!-- Header -->
            <header class="h-20 border-b border-slate-200 bg-white/80 backdrop-blur flex items-center justify-between px-6 sticky top-0 z-20 shadow-sm">
                <div class="flex items-center gap-4">
                    <h1 class="text-lg font-bold text-slate-800 uppercase tracking-wider">Settings</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden md:flex relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" placeholder="Search..." class="bg-slate-100 border border-slate-200 rounded-full pl-10 pr-4 py-2 text-sm text-slate-800 focus:outline-none focus:border-cyan-500 focus:bg-white transition-all w-64 shadow-sm">
                    </div>
                    <button class="relative p-2 text-slate-500 hover:text-slate-800 transition-colors">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-fuchsia-500 rounded-full animate-pulse ring-2 ring-white"></span>
                    </button>
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-500 p-[2px] cursor-pointer shadow-md">
                        <div class="w-full h-full rounded-full bg-white flex items-center justify-center">
                            <span class="text-xs font-bold text-slate-700">AS</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Settings Content -->
            <main class="flex-1 overflow-y-auto p-4 md:p-8 animate-fadeIn">
                <div class="max-w-3xl mx-auto">

                    <!-- Tab Navigation -->
                    <div class="flex items-center gap-1 bg-white border border-slate-200 rounded-xl p-1.5 shadow-sm mb-8">
                        <button class="flex-1 px-4 py-2.5 rounded-lg text-sm font-bold transition-all bg-gradient-to-r from-cyan-500 to-blue-600 text-white shadow-md" onclick="switchTab('profile')">プロフィール</button>
                        <button class="flex-1 px-4 py-2.5 rounded-lg text-sm font-medium transition-all text-slate-500 hover:text-slate-800 hover:bg-slate-50" onclick="switchTab('account')">アカウント</button>
                        <button class="flex-1 px-4 py-2.5 rounded-lg text-sm font-medium transition-all text-slate-500 hover:text-slate-800 hover:bg-slate-50" onclick="switchTab('notifications')">通知設定</button>
                        <button class="flex-1 px-4 py-2.5 rounded-lg text-sm font-medium transition-all text-slate-500 hover:text-slate-800 hover:bg-slate-50" onclick="switchTab('display')">表示設定</button>
                    </div>

                    <!-- Profile Tab -->
                    <div id="tab-profile">
                        <div class="bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-sm mb-6">
                            <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                <i data-lucide="user" class="w-5 h-5 text-cyan-600"></i>
                                プロフィール情報
                            </h2>

                            <!-- Avatar Upload -->
                            <div class="flex items-center gap-6 mb-8">
                                <div class="relative group">
                                    <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-fuchsia-500 to-purple-600 flex items-center justify-center text-white text-2xl font-bold shadow-lg">AS</div>
                                    <div class="absolute inset-0 rounded-full bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                                        <i data-lucide="camera" class="w-6 h-6 text-white"></i>
                                    </div>
                                </div>
                                <div>
                                    <p class="text-sm font-bold text-slate-700 mb-1">プロフィール画像</p>
                                    <p class="text-xs text-slate-500 mb-2">JPG, PNG, GIF (最大 2MB)</p>
                                    <button class="px-4 py-1.5 text-xs font-medium border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50 transition-colors">画像を変更</button>
                                </div>
                            </div>

                            <!-- Form Fields -->
                            <div class="space-y-6">
                                <!-- 氏名 -->
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">氏名</label>
                                    <input type="text" value="長谷川 麻子" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/10 transition-all bg-white">
                                </div>

                                <!-- メールアドレス -->
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">メールアドレス</label>
                                    <input type="email" value="asako.hasegawa@example.com" disabled class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-400 bg-slate-50 cursor-not-allowed">
                                    <p class="text-xs text-slate-400 mt-1.5 flex items-center gap-1">
                                        <i data-lucide="lock" class="w-3 h-3"></i>
                                        メールアドレスの変更はサポートにお問い合わせください
                                    </p>
                                </div>

                                <!-- 自己紹介 -->
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">自己紹介</label>
                                    <textarea rows="4" placeholder="あなたについて教えてください..." class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/10 transition-all bg-white resize-none">Webデザインとフロントエンド開発を学んでいます。AIを活用したクリエイティブワークに興味があります。</textarea>
                                    <p class="text-xs text-slate-400 mt-1 text-right">82 / 200</p>
                                </div>

                                <!-- スキルタグ -->
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">スキルタグ</label>
                                    <div class="flex flex-wrap gap-2 mb-3">
                                        <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-cyan-50 text-cyan-700 text-xs font-medium rounded-full border border-cyan-100">
                                            HTML/CSS
                                            <button class="hover:text-cyan-900"><i data-lucide="x" class="w-3 h-3"></i></button>
                                        </span>
                                        <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-cyan-50 text-cyan-700 text-xs font-medium rounded-full border border-cyan-100">
                                            JavaScript
                                            <button class="hover:text-cyan-900"><i data-lucide="x" class="w-3 h-3"></i></button>
                                        </span>
                                        <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-cyan-50 text-cyan-700 text-xs font-medium rounded-full border border-cyan-100">
                                            Figma
                                            <button class="hover:text-cyan-900"><i data-lucide="x" class="w-3 h-3"></i></button>
                                        </span>
                                        <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-fuchsia-50 text-fuchsia-700 text-xs font-medium rounded-full border border-fuchsia-100">
                                            React
                                            <button class="hover:text-fuchsia-900"><i data-lucide="x" class="w-3 h-3"></i></button>
                                        </span>
                                    </div>
                                    <input type="text" placeholder="スキルを追加 (Enterで確定)" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/10 transition-all bg-white">
                                </div>

                                <!-- SNSリンク -->
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">SNSリンク</label>
                                    <div class="space-y-3">
                                        <div class="flex items-center gap-3">
                                            <div class="w-10 h-10 rounded-lg bg-slate-100 flex items-center justify-center shrink-0">
                                                <i data-lucide="twitter" class="w-5 h-5 text-slate-500"></i>
                                            </div>
                                            <input type="url" placeholder="https://twitter.com/username" value="https://twitter.com/asako_design" class="flex-1 px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/10 transition-all bg-white">
                                        </div>
                                        <div class="flex items-center gap-3">
                                            <div class="w-10 h-10 rounded-lg bg-slate-100 flex items-center justify-center shrink-0">
                                                <i data-lucide="github" class="w-5 h-5 text-slate-500"></i>
                                            </div>
                                            <input type="url" placeholder="https://github.com/username" value="https://github.com/asako-h" class="flex-1 px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/10 transition-all bg-white">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Save Button -->
                            <div class="mt-8 pt-6 border-t border-slate-100 flex justify-end">
                                <button class="px-8 py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold hover:shadow-lg hover:shadow-cyan-500/25 transition-all flex items-center gap-2">
                                    <i data-lucide="save" class="w-4 h-4"></i>
                                    保存する
                                </button>
                            </div>
                        </div>

                        <!-- Account Section (shown below profile as separate card) -->
                        <div class="bg-white border border-slate-200 rounded-2xl p-6 md:p-8 shadow-sm mb-6">
                            <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                <i data-lucide="shield" class="w-5 h-5 text-cyan-600"></i>
                                パスワード変更
                            </h2>

                            <div class="space-y-5">
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">現在のパスワード</label>
                                    <input type="password" placeholder="現在のパスワードを入力" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/10 transition-all bg-white">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">新しいパスワード</label>
                                    <input type="password" placeholder="新しいパスワードを入力" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/10 transition-all bg-white">
                                    <p class="text-xs text-slate-400 mt-1.5">8文字以上、大文字・小文字・数字を含めてください</p>
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">パスワード確認</label>
                                    <input type="password" placeholder="新しいパスワードを再入力" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/10 transition-all bg-white">
                                </div>
                            </div>

                            <div class="mt-6 flex justify-end">
                                <button class="px-6 py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold hover:shadow-lg hover:shadow-cyan-500/25 transition-all flex items-center gap-2">
                                    <i data-lucide="key" class="w-4 h-4"></i>
                                    パスワードを更新
                                </button>
                            </div>
                        </div>

                        <!-- Danger Zone -->
                        <div class="bg-white border border-red-200 rounded-2xl p-6 md:p-8 shadow-sm mb-6">
                            <h2 class="text-xl font-bold text-red-600 mb-2 flex items-center gap-2">
                                <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                                Danger Zone
                            </h2>
                            <p class="text-sm text-slate-500 mb-6">アカウントを削除すると、すべてのデータが完全に削除され、復元できません。</p>
                            <button class="px-6 py-3 rounded-xl border-2 border-red-300 text-red-600 font-bold hover:bg-red-50 hover:border-red-400 transition-all flex items-center gap-2">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                アカウントを削除
                            </button>
                        </div>

                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            // This is a simplified tab switcher for the UI prototype
            const buttons = document.querySelectorAll('.flex.items-center.gap-1 button');
            buttons.forEach(btn => {
                btn.className = 'flex-1 px-4 py-2.5 rounded-lg text-sm font-medium transition-all text-slate-500 hover:text-slate-800 hover:bg-slate-50';
            });
            const tabIndex = { profile: 0, account: 1, notifications: 2, display: 3 };
            if (buttons[tabIndex[tabName]]) {
                buttons[tabIndex[tabName]].className = 'flex-1 px-4 py-2.5 rounded-lg text-sm font-bold transition-all bg-gradient-to-r from-cyan-500 to-blue-600 text-white shadow-md';
            }
        }
        lucide.createIcons();
    </script>
</body>
</html>
