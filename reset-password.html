<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワードリセット - MOMOCRI School Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center relative overflow-hidden">
    <!-- Gradient decoration blobs -->
    <div class="absolute top-[-120px] left-[-120px] w-96 h-96 bg-fuchsia-300 opacity-30 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-[-120px] right-[-120px] w-96 h-96 bg-cyan-300 opacity-30 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-md mx-auto px-4 relative z-10">
        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <!-- Logo -->
            <div class="flex items-center justify-center gap-3 mb-8">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="zap" class="w-6 h-6 text-white"></i>
                </div>
                <span class="text-2xl font-bold text-slate-800">MOMOCRI</span>
            </div>

            <!-- Reset Form State -->
            <div id="resetForm">
                <!-- Header icon -->
                <div class="flex justify-center mb-4">
                    <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center">
                        <i data-lucide="key-round" class="w-8 h-8 text-slate-500"></i>
                    </div>
                </div>

                <h1 class="text-xl font-bold text-slate-800 text-center mb-2">パスワードリセット</h1>
                <p class="text-sm text-slate-500 text-center mb-8">登録済みのメールアドレスを入力してください。パスワードリセット用のリンクをお送りします。</p>

                <!-- Form -->
                <form id="resetPasswordForm" onsubmit="handleSubmit(event)">
                    <!-- Email field -->
                    <div class="mb-6">
                        <label for="email" class="block text-sm font-medium text-slate-700 mb-2">メールアドレス</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="mail" class="w-5 h-5 text-slate-400"></i>
                            </div>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                required
                                placeholder="example@email.com"
                                class="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition"
                            >
                        </div>
                    </div>

                    <!-- Submit button -->
                    <button
                        type="submit"
                        class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-semibold rounded-xl hover:from-cyan-600 hover:to-blue-700 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2 transition shadow-lg shadow-cyan-500/25"
                    >
                        リセットリンクを送信
                    </button>
                </form>
            </div>

            <!-- Success State (hidden by default) -->
            <div id="successState" class="hidden">
                <div class="flex justify-center mb-4">
                    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center">
                        <i data-lucide="check-circle-2" class="w-8 h-8 text-green-500"></i>
                    </div>
                </div>

                <h2 class="text-xl font-bold text-slate-800 text-center mb-2">メールを送信しました</h2>
                <p class="text-sm text-slate-500 text-center mb-6">パスワードリセット用のリンクをメールで送信しました。メールをご確認ください。</p>
            </div>

            <!-- Back to login link -->
            <div class="mt-6 text-center">
                <a href="login.html" class="inline-flex items-center gap-1 text-sm text-cyan-600 hover:text-cyan-700 font-medium transition">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    ログインに戻る
                </a>
            </div>
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            document.getElementById('resetForm').classList.add('hidden');
            document.getElementById('successState').classList.remove('hidden');
        }

        lucide.createIcons();
    </script>
</body>
</html>
