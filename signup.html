<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規会員登録 - MOMOCRI School Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-cyan-200">

    <!-- Background Decoration -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[10%] right-[15%] w-[500px] h-[500px] bg-fuchsia-200/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[10%] left-[10%] w-[400px] h-[400px] bg-cyan-200/20 rounded-full blur-[120px]"></div>
    </div>

    <!-- Main Content -->
    <div class="min-h-screen flex items-center justify-center px-4 py-12 animate-fadeIn">
        <div class="w-full max-w-md">

            <!-- Logo -->
            <div class="flex items-center justify-center gap-2 mb-8">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/30">
                    <i data-lucide="zap" class="w-6 h-6 text-white"></i>
                </div>
                <span class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-500 tracking-wider">MOMOCRI</span>
            </div>

            <!-- Card -->
            <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-8">

                <h2 class="text-2xl font-bold text-slate-800 text-center mb-2">新規会員登録</h2>
                <p class="text-sm text-slate-500 text-center mb-6">アカウントを作成して学習を始めましょう</p>

                <!-- Account Type Tabs -->
                <div class="flex bg-slate-100 rounded-xl p-1 mb-6">
                    <button id="tab-personal" onclick="switchTab('personal')" class="flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all duration-200 bg-gradient-to-r from-cyan-500 to-blue-600 text-white shadow-sm">
                        <span class="flex items-center justify-center gap-1.5">
                            <i data-lucide="user" class="w-4 h-4"></i>
                            個人
                        </span>
                    </button>
                    <button id="tab-corporate" onclick="switchTab('corporate')" class="flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all duration-200 text-slate-500 hover:text-slate-700">
                        <span class="flex items-center justify-center gap-1.5">
                            <i data-lucide="building-2" class="w-4 h-4"></i>
                            法人
                        </span>
                    </button>
                </div>

                <!-- Registration Form -->
                <form onsubmit="return false;" class="space-y-4">

                    <!-- Name -->
                    <div>
                        <label for="name" class="block text-sm font-medium text-slate-700 mb-1.5">氏名</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="text" id="name" placeholder="山田 太郎" required
                                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm text-slate-800 placeholder:text-slate-400 focus:outline-none focus:border-cyan-500 focus:bg-white focus:ring-2 focus:ring-cyan-500/20 transition-all">
                        </div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">メールアドレス</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="email" id="email" placeholder="example@email.com" required
                                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm text-slate-800 placeholder:text-slate-400 focus:outline-none focus:border-cyan-500 focus:bg-white focus:ring-2 focus:ring-cyan-500/20 transition-all">
                        </div>
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">パスワード</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="password" id="password" placeholder="8文字以上で入力" required minlength="8"
                                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm text-slate-800 placeholder:text-slate-400 focus:outline-none focus:border-cyan-500 focus:bg-white focus:ring-2 focus:ring-cyan-500/20 transition-all">
                        </div>
                        <p class="mt-1 text-xs text-slate-400">※ 8文字以上で設定してください</p>
                    </div>

                    <!-- Password Confirmation -->
                    <div>
                        <label for="password-confirm" class="block text-sm font-medium text-slate-700 mb-1.5">パスワード（確認）</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="password" id="password-confirm" placeholder="パスワードを再入力" required minlength="8"
                                class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm text-slate-800 placeholder:text-slate-400 focus:outline-none focus:border-cyan-500 focus:bg-white focus:ring-2 focus:ring-cyan-500/20 transition-all">
                        </div>
                    </div>

                    <!-- Terms Agreement -->
                    <div class="flex items-start gap-2 pt-1">
                        <input type="checkbox" id="terms" required
                            class="mt-0.5 w-4 h-4 rounded border-slate-300 text-cyan-600 focus:ring-cyan-500/20 cursor-pointer">
                        <label for="terms" class="text-sm text-slate-600 leading-snug cursor-pointer">
                            <a href="terms.html" class="text-cyan-600 hover:text-cyan-700 underline underline-offset-2">利用規約</a>および<a href="terms.html" class="text-cyan-600 hover:text-cyan-700 underline underline-offset-2">プライバシーポリシー</a>に同意します
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit"
                        class="w-full py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold text-sm hover:shadow-lg hover:shadow-cyan-500/25 transition-all duration-200 flex items-center justify-center gap-2 mt-2">
                        <i data-lucide="user-plus" class="w-4 h-4"></i>
                        アカウントを作成
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center gap-4 my-6">
                    <div class="flex-1 h-px bg-slate-200"></div>
                    <span class="text-xs text-slate-400 font-medium">or</span>
                    <div class="flex-1 h-px bg-slate-200"></div>
                </div>

                <!-- Social Signup Buttons -->
                <div class="space-y-3">
                    <button class="w-full py-2.5 px-4 rounded-xl border border-slate-200 bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 hover:border-slate-300 transition-all duration-200 flex items-center justify-center gap-3">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Googleで登録
                    </button>

                    <button class="w-full py-2.5 px-4 rounded-xl border border-slate-200 bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 hover:border-slate-300 transition-all duration-200 flex items-center justify-center gap-3">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                        </svg>
                        GitHubで登録
                    </button>
                </div>

                <!-- Login Link -->
                <p class="text-center text-sm text-slate-500 mt-6">
                    すでにアカウントをお持ちですか？
                    <a href="login.html" class="text-cyan-600 hover:text-cyan-700 font-medium underline underline-offset-2">ログイン</a>
                </p>
            </div>

        </div>
    </div>

    <script>
        function switchTab(type) {
            const personalTab = document.getElementById('tab-personal');
            const corporateTab = document.getElementById('tab-corporate');

            if (type === 'personal') {
                personalTab.className = 'flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all duration-200 bg-gradient-to-r from-cyan-500 to-blue-600 text-white shadow-sm';
                corporateTab.className = 'flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all duration-200 text-slate-500 hover:text-slate-700';
            } else {
                corporateTab.className = 'flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all duration-200 bg-gradient-to-r from-cyan-500 to-blue-600 text-white shadow-sm';
                personalTab.className = 'flex-1 py-2.5 px-4 rounded-lg text-sm font-medium transition-all duration-200 text-slate-500 hover:text-slate-700';
            }

            // Re-initialize icons after tab switch
            lucide.createIcons();
        }

        lucide.createIcons();
    </script>
</body>
</html>
