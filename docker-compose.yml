services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: momocri_db
      POSTGRES_USER: momocri
      POSTGRES_PASSWORD: momocri_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
