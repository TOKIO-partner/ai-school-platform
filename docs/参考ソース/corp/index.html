<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法人管理 - MOMOCRI School Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-cyan-200">
    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <div class="w-64 bg-white border-r border-slate-200 flex flex-col z-30 shadow-xl lg:shadow-none hidden lg:flex">
            <div class="h-20 flex items-center justify-center border-b border-slate-100">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/30">
                        <i data-lucide="zap" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-500 tracking-wider">MOMOCRI</span>
                </div>
            </div>

            <nav class="p-4 space-y-2 flex-1">
                <a href="../index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-900 hover:bg-slate-50">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span class="font-medium">ダッシュボード</span>
                </a>
                <a href="../learning.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-900 hover:bg-slate-50">
                    <i data-lucide="monitor" class="w-5 h-5"></i>
                    <span class="font-medium">学習ルーム</span>
                </a>
                <a href="../courses.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-900 hover:bg-slate-50">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                    <span class="font-medium">コース一覧</span>
                </a>
                <a href="../community.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-900 hover:bg-slate-50">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="font-medium">コミュニティ</span>
                </a>
                <a href="../corp/index.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 bg-gradient-to-r from-cyan-50 to-blue-50 text-cyan-600 border border-cyan-100 shadow-sm">
                    <i data-lucide="bar-chart-2" class="w-5 h-5 text-cyan-600"></i>
                    <span class="font-medium">管理者/法人</span>
                    <div class="ml-auto w-1.5 h-1.5 rounded-full bg-cyan-500 shadow-[0_0_8px_rgba(6,182,212,0.6)]"></div>
                </a>
            </nav>
            <div class="p-4 border-t border-slate-100">
                <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-slate-50 border border-slate-200">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-fuchsia-500 to-purple-600 flex items-center justify-center text-white font-bold shadow-md">AS</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-slate-700 truncate">長谷川 麻子</p>
                        <p class="text-xs text-slate-500 truncate">Pro Plan</p>
                    </div>
                    <i data-lucide="settings" class="w-5 h-5 text-slate-400 cursor-pointer hover:text-slate-600"></i>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 bg-slate-50 relative overflow-hidden">
             <!-- Background Decoration -->
             <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
                <div class="absolute top-[20%] right-[10%] w-[600px] h-[600px] bg-fuchsia-200/20 rounded-full blur-[120px]"></div>
                <div class="absolute bottom-[10%] left-[5%] w-[500px] h-[500px] bg-cyan-200/20 rounded-full blur-[120px]"></div>
            </div>

            <header class="h-20 border-b border-slate-200 bg-white/80 backdrop-blur flex items-center justify-between px-6 sticky top-0 z-20 shadow-sm">
                <h1 class="text-lg font-bold text-slate-800 uppercase tracking-wider">Administration</h1>
                <div class="flex items-center gap-4">
                     <div class="hidden md:flex relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" placeholder="Search..." class="bg-slate-100 border border-slate-200 rounded-full pl-10 pr-4 py-2 text-sm text-slate-800 focus:outline-none focus:border-cyan-500 focus:bg-white transition-all w-64 shadow-sm">
                    </div>
                    <button class="relative p-2 text-slate-500 hover:text-slate-800 transition-colors">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-fuchsia-500 rounded-full animate-pulse ring-2 ring-white"></span>
                    </button>
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-cyan-400 to-blue-500 p-[2px] cursor-pointer shadow-md">
                        <div class="w-full h-full rounded-full bg-white flex items-center justify-center">
                            <span class="text-xs font-bold text-slate-700">AS</span>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 md:p-8 animate-fadeIn">
                <div class="space-y-6">
                    <div class="flex justify-between items-end">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800 mb-1">法人管理コンソール</h2>
                            <p class="text-slate-500 text-sm">株式会社テック 様の受講状況レポート</p>
                        </div>
                        <button class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-slate-600 text-sm hover:bg-slate-50 flex items-center gap-2 shadow-sm">
                            <i data-lucide="settings" class="w-4 h-4"></i> 管理設定
                        </button>
                    </div>

                    <!-- Analytics Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm">
                            <p class="text-slate-500 text-xs mb-1">登録ユーザー数</p>
                            <p class="text-2xl font-bold text-slate-800">24 <span class="text-xs font-normal text-green-500">+2</span></p>
                        </div>
                        <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm">
                            <p class="text-slate-500 text-xs mb-1">平均進捗率</p>
                            <p class="text-2xl font-bold text-slate-800">68% <span class="text-xs font-normal text-green-500">+5%</span></p>
                        </div>
                        <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm">
                            <p class="text-slate-500 text-xs mb-1">総学習時間</p>
                            <p class="text-2xl font-bold text-slate-800">1,240h</p>
                        </div>
                        <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm">
                            <p class="text-slate-500 text-xs mb-1">AI活用回数</p>
                            <p class="text-2xl font-bold text-slate-800">850 <span class="text-xs font-normal text-fuchsia-500">High</span></p>
                        </div>
                    </div>

                    <!-- User Table -->
                    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                            <h3 class="font-bold text-slate-800">受講者リスト</h3>
                            <div class="relative">
                                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                                <input type="text" placeholder="名前で検索..." class="bg-white border border-slate-200 rounded-lg pl-9 pr-4 py-1.5 text-sm text-slate-700 focus:outline-none focus:border-cyan-500">
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left text-slate-600">
                                <thead class="text-xs text-slate-500 uppercase bg-slate-50">
                                    <tr>
                                        <th class="px-6 py-3">氏名</th>
                                        <th class="px-6 py-3">所属</th>
                                        <th class="px-6 py-3">進捗状況</th>
                                        <th class="px-6 py-3">最終ログイン</th>
                                        <th class="px-6 py-3">ステータス</th>
                                        <th class="px-6 py-3">アクション</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                        <td class="px-6 py-4 font-bold text-slate-800">佐藤 健太</td>
                                        <td class="px-6 py-4">株式会社テック</td>
                                        <td class="px-6 py-4">
                                            <div class="flex items-center gap-2">
                                                <div class="w-16 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                                    <div class="h-full bg-cyan-500" style="width: 85%"></div>
                                                </div>
                                                <span class="text-xs font-medium">85%</span>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4">2時間前</td>
                                        <td class="px-6 py-4">
                                            <span class="px-2 py-1 rounded-full text-xs font-medium border bg-green-50 text-green-600 border-green-200">Active</span>
                                        </td>
                                        <td class="px-6 py-4">
                                            <button class="text-cyan-600 hover:text-cyan-800 font-medium">詳細</button>
                                        </td>
                                    </tr>
                                    <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                        <td class="px-6 py-4 font-bold text-slate-800">鈴木 美咲</td>
                                        <td class="px-6 py-4">デザインラボ</td>
                                        <td class="px-6 py-4">
                                            <div class="flex items-center gap-2">
                                                <div class="w-16 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                                    <div class="h-full bg-cyan-500" style="width: 42%"></div>
                                                </div>
                                                <span class="text-xs font-medium">42%</span>
                                            </div>
                                        </td>
                                        <td class="px-6 py-4">1日前</td>
                                        <td class="px-6 py-4">
                                            <span class="px-2 py-1 rounded-full text-xs font-medium border bg-yellow-50 text-yellow-600 border-yellow-200">Warning</span>
                                        </td>
                                        <td class="px-6 py-4">
                                            <button class="text-cyan-600 hover:text-cyan-800 font-medium">詳細</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
